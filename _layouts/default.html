<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Thomas Tharakan Kuttiyil Oommen</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    
    <!-- Custom Layout Typography & Font Styles -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono&family=Inter:wght@300;400;600;700&display=swap');
        
        :root {
            --glass-bg: rgba(17, 24, 39, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        .mono { font-family: 'Space Mono', monospace; }
        body { font-family: 'Inter', sans-serif; }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
        }
    </style>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body class="bg-[#0a0a0a] text-gray-300 antialiased selection:bg-cyan-500/30">
    
    <!-- FIXED ANCHOR HEIGHT CONTAINER SYSTEM -->
    <div class="w-full h-[96px] md:h-[112px] relative z-50">
        <header class="fixed top-0 inset-x-0 max-w-6xl mx-auto my-4 px-4 md:px-0 z-50">
            <!-- Navigation Inner Glass Card Bar Layout -->
            <div class="flex items-center justify-between py-4 px-6 glass rounded-3xl border border-white/5 bg-neutral-950/20 backdrop-blur-md">
                <!-- Logo Layout Target Element -->
                <a href="{{ '/' | relative_url }}" class="font-bold text-white text-lg tracking-tight hover:text-cyan-400 transition-colors">
                    Thomas Tharakan Kuttiyil Oommen<span class="text-cyan-400">.</span>
                </a>

                <!-- Mobile Header Hamburger Trigger Button Icon -->
                <button id="menu-toggle" class="block md:hidden text-gray-400 hover:text-white focus:outline-none transition-colors py-1" aria-label="Toggle Menu">
                    <svg id="menu-icon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>

                <!-- Desktop Core Layout Navigation Links -->
                <nav class="hidden md:flex items-center gap-8 text-sm font-medium">
                    <a href="{{ '/' | relative_url }}#expertise" class="text-gray-300 hover:text-cyan-400 transition">Expertise</a>
                    <a href="{{ '/' | relative_url }}#tech-stack" class="text-gray-300 hover:text-cyan-400 transition">Tech Stack</a>
                    <a href="{{ '/' | relative_url }}#work" class="text-gray-300 hover:text-cyan-400 transition">Projects</a>
                    <a href="{{ '/blog/' | relative_url }}" class="text-indigo-400 hover:text-indigo-300 transition font-semibold">Insights</a>
                    <a href="mailto:thomas@kuttiyil.net" class="text-gray-300 hover:text-cyan-400 transition">Contact</a>
                    
                    <!-- Integrated Desktop Inline Branding Social Handles -->
                    <a href="https://linkedin.com/in/thomas-tharakan" target="_blank" rel="noopener" class="text-gray-400 hover:text-white transition flex items-center group ml-2" aria-label="LinkedIn">
                        <svg class="w-4 h-4 fill-gray-400 group-hover:fill-white transition-colors" viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
                    </a>
                    <a href="https://github.com" target="_blank" rel="noopener" class="text-gray-400 hover:text-white transition flex items-center group" aria-label="GitHub">
                        <svg class="w-4 h-4 fill-gray-400 group-hover:fill-white transition-colors" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                    </a>
                </nav>
            </div>

            <!-- Mobile Interactive Dropdown Window Drawer Layout -->
            <nav id="menu-links" class="hidden absolute top-[76px] inset-x-0 mx-4 flex-col items-start gap-1 glass bg-neutral-950/95 backdrop-blur-xl p-6 rounded-2xl border border-white/5 text-sm font-medium z-50 max-h-[calc(100vh-120px)] overflow-y-auto">
                <a href="{{ '/' | relative_url }}#expertise" class="w-full text-gray-300 hover:text-cyan-400 transition py-3 border-b border-white/5">Expertise</a>
                <a href="{{ '/' | relative_url }}#tech-stack" class="w-full text-gray-300 hover:text-cyan-400 transition py-3 border-b border-white/5">Tech Stack</a>
                <a href="{{ '/' | relative_url }}#work" class="w-full text-gray-300 hover:text-cyan-400 transition py-3 border-b border-white/5">Projects</a>
                <a href="{{ '/blog/' | relative_url }}" class="w-full text-indigo-400 hover:text-indigo-300 transition py-3 font-semibold border-b border-white/5">Insights</a>
                <a href="mailto:thomas@kuttiyil.net" class="w-full text-gray-300 hover:text-cyan-400 transition py-3 border-b border-white/5">Contact</a>
                
                <a href="https://linkedin.com/in/thomas-tharakan" target="_blank" rel="noopener" class="w-full text-gray-400 hover:text-white transition py-3 border-b border-white/5 flex items-center gap-2 group">
                    <svg class="w-4 h-4 fill-gray-400 group-hover:fill-white transition-colors" viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
                    <span>LinkedIn</span>
                </a>
                <a href="https://github.com/tharakanenator" target="_blank" rel="noopener" class="w-full text-gray-400 hover:text-white transition py-3 flex items-center gap-2 group">
                    <svg class="w-4 h-4 fill-gray-400 group-hover:fill-white transition-colors" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                    <span>GitHub</span>
                </a>
            </nav>
        </header>
    </div>

    <!-- Core Content Wrapper Block -->
    <main class="max-w-4xl mx-auto px-6 pb-20">
        {{ content }}
    </main>

    <!-- Footer System -->
    <footer class="py-20 text-center border-t border-white/5">
        <p class="mono text-xs text-gray-500 uppercase tracking-widest">
            Based in DMV Area | Have a question? <a href="mailto:thomas@kuttiyil.net">Email</a> or Connect on <a href="https://linkedin.com/in/thomas-tharakan/">LinkedIn!</a>
        </p>
    </footer>

    <!-- Scripts Engine Initialization -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        // Initialize Icons
        lucide.createIcons();

        // Mobile Drawer Layout Elements
        const menuToggle = document.getElementById('menu-toggle');
        const menuLinks = document.getElementById('menu-links');
        const menuIcon = document.getElementById('menu-icon');

        menuToggle.addEventListener('click', () => {
            menuLinks.classList.toggle('hidden');
            menuLinks.classList.toggle('flex');

            // Swap between burger lines and close "X" symbol smoothly
            if (menuLinks.classList.contains('flex')) {
                menuIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>`;
            } else {
                menuIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>`;
            }
        });

        // Auto-close menu drawer when clicking an internal layout anchor link
        menuLinks.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                if (!menuLinks.classList.contains('hidden') && window.innerWidth < 768) {
                    menuLinks.classList.add('hidden');
                    menuLinks.classList.remove('flex');
                    menuIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>`;
                }
            });
        });
      });
    </script>
</body>
</html>
