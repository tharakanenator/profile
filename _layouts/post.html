<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | TIL</title>
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
</head>
<body>
    <header>
        <a href="{{ '/' | relative_url }}">← Back to Dashboard</a>
    </header>
    
    <main class="post-content">
        <h1>{{ page.title }}</h1>
        <p class="post-meta">{{ page.date | date: "%B %d, %y" }} • {{ page.category }}</p>
        <hr>
        
        {{ content }}
    </main>
</body>
</html>
