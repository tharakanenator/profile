---
---
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <!-- Link to your Tailwind/CSS file here -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body class="bg-[#0a0a0a] text-gray-300 antialiased">
    <nav class="p-6">
        <a href="{{ '/' | relative_url }}" class="text-indigo-400 hover:text-white transition-colors">← Back to Dashboard</a>
    </nav>

    <main class="max-w-3xl mx-auto px-6 py-12">
        <header class="mb-10 border-b border-white/10 pb-8">
            <span class="text-indigo-500 mono uppercase tracking-widest text-xs">#{{ page.category }}</span>
            <h1 class="text-4xl font-bold text-white mt-2">{{ page.title }}</h1>
            <p class="text-sm text-gray-500 mt-4 mono italic">{{ page.date | date: "%B %d, %Y" }}</p>
        </header>

        <article class="prose prose-invert prose-indigo max-w-none">
            {{ content }}
        </article>
    </main>
</body>
</html>
