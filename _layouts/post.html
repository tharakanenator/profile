---
layout: default
---
<!-- Individual Article Wrapper -->
<!-- Self-contained max-w-3xl prevents lines from over-stretching across the new wide global main container -->
<article class="max-w-3xl mx-auto px-4 md:px-6 pb-20">
    
    <!-- Post Header Block -->
    <header class="mb-12 border-b border-white/5 pb-8">
        <div class="flex items-center space-x-3 mb-3">
            {% if page.category %}
            <span class="px-2 py-1 bg-cyan-500/10 text-cyan-400 mono uppercase tracking-tighter text-[10px] border border-cyan-500/20 rounded">
                #{{ page.category }}
            </span>
            {% endif %}
            <span class="text-gray-600 mono text-[10px] uppercase tracking-widest">
                {{ page.date | date: "%B %d, %Y" }}
            </span>
        </div>
        <h1 class="text-4xl md:text-5xl font-bold text-white tracking-tight">
            {{ page.title }}
        </h1>
    </header>

    <!-- Markdown Engine Content Injection Window -->
    <!-- Enhanced prose configuration to seamlessly adapt custom branding tokens -->
    <div class="prose prose-lg prose-invert prose-cyan max-w-none 
                prose-headings:font-bold prose-headings:tracking-tight prose-headings:text-white
                prose-p:leading-relaxed prose-p:text-gray-400
                prose-li:text-gray-400
                prose-strong:text-white
                prose-a:text-cyan-400 hover:prose-a:text-cyan-300 prose-a:transition-colors
                prose-code:text-cyan-300 prose-code:bg-white/5 prose-code:px-1.5 prose-code:py-0.5 prose-code:rounded prose-code:before:content-none prose-code:after:content-none
                prose-blockquote:border-l-cyan-500 prose-blockquote:bg-cyan-500/5 prose-blockquote:py-1 prose-blockquote:px-6 prose-blockquote:rounded-r-lg prose-blockquote:text-gray-300">
        {{ content }}
    </div>

</article>
