<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Thomas Tharakan</title>
   <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    
    <!-- 1. ADDING CUSTOM STYLES BACK IN -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono&family=Inter:wght@300;400;600;700&display=swap');
        
        :root {
            --glass-bg: rgba(17, 24, 39, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        .mono { font-family: 'Space Mono', monospace; }
        body { font-family: 'Inter', sans-serif; }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
        }

        /* Prevent markdown content from hiding under the fixed nav */
        main { padding-top: 120px; }
    </style>

    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body class="bg-[#0a0a0a] text-gray-300 antialiased">
    
    <!-- YOUR NAV BAR -->
    <header class="relative flex items-center justify-between py-6 px-4 md:px-0 z-50">
    <!-- Your Logo / Brand Name -->
    <a href="{{ '/' | relative_url }}" class="font-bold text-white text-lg tracking-tight">
        Portfolio<span class="text-cyan-400">.</span>
    </a>

    <!-- Hamburger Menu Button (Visible ONLY on Mobile) -->
    <button id="menu-toggle" class="block md:hidden text-gray-400 hover:text-white focus:outline-none z-50 transition-colors" aria-label="Toggle Menu">
        <svg id="menu-icon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
    </button>

    <!-- Navigation Menu Wrapper -->
    <!-- Mobile: Absolute overlay hidden by default | Desktop: Standard horizontal inline flex row -->
    <nav id="menu-links" class="hidden md:flex flex-col md:flex-row items-start md:items-center gap-4 md:gap-8 absolute md:relative top-full left-0 w-full md:w-auto bg-black/95 md:bg-transparent p-6 md:p-0 border-b border-white/5 md:border-none backdrop-blur-md md:backdrop-blur-none text-sm font-medium">
        <a href="{{ '/' | relative_url }}#expertise" class="w-full md:w-auto hover:text-cyan-400 transition py-2 border-b border-white/5 md:border-none">Expertise</a>
        <a href="{{ '/' | relative_url }}#tech-stack" class="w-full md:w-auto hover:text-cyan-400 transition py-2 border-b border-white/5 md:border-none">Tech Stack</a>
        <a href="{{ '/' | relative_url }}#work" class="w-full md:w-auto hover:text-cyan-400 transition py-2 border-b border-white/5 md:border-none">Projects</a>
        <a href="{{ '/blog/' | relative_url }}" class="w-full md:w-auto text-indigo-400 hover:text-indigo-300 transition py-2 font-semibold border-b border-white/5 md:border-none">Insights</a>
        <a href="{{ '/' | relative_url }}#contact" class="w-full md:w-auto hover:text-cyan-400 transition py-2 border-b border-white/5 md:border-none">Contact</a>
        
        <!-- Social Profiles -->
        <a href="https://linkedin.com" target="_blank" rel="noopener" class="w-full md:w-auto text-gray-400 hover:text-white transition py-2 border-b border-white/5 md:border-none">LinkedIn</a>
        <a href="https://github.com" target="_blank" rel="noopener" class="w-full md:w-auto text-gray-400 hover:text-white transition py-2">GitHub</a>
    </nav>
</header>

    <!-- 4. CONTENT WRAPPER -->
    <main>
        {{ content }}
    </main>

    <!-- FOOTER -->
    <footer class="py-20 text-center border-t border-white/5">
        <p class="mono text-xs text-gray-500 uppercase tracking-widest">
            Based in DMV Area | Have a question? <a href="mailto:thomas@kuttiyil.net">Email</a> or Connect on <a href="https://linkedin.com/in/thomas-tharakan/">LinkedIn!</a>
        </p>
    </footer>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>lucide.createIcons();</script>
    <script>
    const menuToggle = document.getElementById('menu-toggle');
    const menuLinks = document.getElementById('menu-links');
    const menuIcon = document.getElementById('menu-icon');

    menuToggle.addEventListener('click', () => {
        // Toggle the visibility layout class
        menuLinks.classList.toggle('hidden');
        menuLinks.classList.toggle('flex');

        // Dynamically change the icon between Hamburger and Close (X)
        if (menuLinks.classList.contains('flex')) {
            menuIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>`;
        } else {
            menuIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>`;
        }
    });

    // Optional: Close the menu automatically when a mobile layout navigation link is clicked
    menuLinks.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
            if (!menuLinks.classList.contains('hidden') && window.innerWidth < 768) {
                menuLinks.classList.add('hidden');
                menuLinks.classList.remove('flex');
                menuIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>`;
            }
        });
    });
</script>
</body>
</html>
